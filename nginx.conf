server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to TimesFM sidecar
    # forecastAdapter.js calls: ${VITE_TIMESFM_SERVICE_URL}/health
    #                           ${VITE_TIMESFM_SERVICE_URL}/forecast/commute-window
    #                           ${VITE_TIMESFM_SERVICE_URL}/forecast/fuel-trend
    # With VITE_TIMESFM_SERVICE_URL=/api/forecast these become:
    #   /api/forecast/health              → timesfm_service:8008/health
    #   /api/forecast/forecast/commute-window → timesfm_service:8008/forecast/commute-window
    location /api/forecast/ {
        proxy_pass http://timesfm_service:8008/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Reverse proxy to Qwen assistant service
    location /api/chat {
        proxy_pass http://assistant_service:8009/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 40s;
    }

    location /api/assistant/health {
        proxy_pass http://assistant_service:8009/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
