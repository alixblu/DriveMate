name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  USERNAME: alixblu

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: downcase GH repository
        id: lowercase_repo
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push TimesFM
        uses: docker/build-push-action@v5
        with:
          context: .
          file: timesfm_service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}-timesfm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Assistant
        uses: docker/build-push-action@v5
        with:
          context: .
          file: assistant_service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}-assistant:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Deploy to Alibaba Cloud ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_IP }}
          username: ubuntu
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            # Ensure the directory exists. If not, clone the repo.
            if [ ! -d ~/drivemate ]; then
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ~/drivemate
            fi
            
            cd ~/drivemate
            
            # Pull latest docker-compose.yml and code changes
            git reset --hard
            git pull https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
            
            # Generate .env file
            echo "HUGGINGFACE_API_KEY=${{ secrets.HUGGINGFACE_API_KEY }}" > .env
            echo "DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}" >> .env
            echo "QWEN_MODEL=qwen-plus" >> .env
            echo "TIMESFM_ENABLE_LIVE_FUEL=1" >> .env
            
            # Login to GHCR to pull images
            export CR_PAT=${{ secrets.GITHUB_TOKEN }}
            echo $CR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull new images and restart services
            docker compose pull
            docker compose up -d
            
            # Clean up old images
            docker image prune -af
