version: "3.9"

services:
  frontend:
    image: ghcr.io/alixblu/drivemate-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_TIMESFM_SERVICE_URL: /api/forecast
        VITE_ASSISTANT_SERVICE_URL: /api/chat
    ports:
      - "80:80"
    depends_on:
      timesfm_service:
        condition: service_healthy
      assistant_service:
        condition: service_healthy
    networks:
      - drivemate

  timesfm_service:
    image: ghcr.io/alixblu/drivemate-timesfm:latest
    build:
      context: .
      dockerfile: timesfm_service/Dockerfile
    ports:
      - "8008:8008"
    env_file:
      - .env
    volumes:
      - timesfm_cache:/app/timesfm_service/.hf-cache
      - timesfm_home:/app/timesfm_service/.hf-home
    networks:
      - drivemate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  assistant_service:
    image: ghcr.io/alixblu/drivemate-assistant:latest
    build:
      context: .
      dockerfile: assistant_service/Dockerfile
    ports:
      - "8009:8009"
    env_file:
      - .env
    networks:
      - drivemate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8009/health').getcode() == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  drivemate:
    driver: bridge

volumes:
  timesfm_cache:
  timesfm_home:
